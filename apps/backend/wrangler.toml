# apps/backend/wrangler.toml
name = "support-llm4agents"
main = "src/worker.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

[vars]
STORAGE_DRIVER = "cloudflare"
NODE_ENV = "production"
LOG_LEVEL = "info"
COOKIE_SECURE = "true"
CF_D1_BINDING = "DB"
CF_VECTORIZE_BINDING = "VEC"
CF_R2_BINDING = "FILES"
CF_DURABLE_OBJECT_BINDING = "HUB"
PUBLIC_API_URL = "https://support.llm4agents.com"
ADMIN_ORIGIN = "https://support.llm4agents.com"

# Custom domain — requires the llm4agents.com zone to live in this CF account.
# Wrangler provisions the DNS record + TLS cert on first deploy.
[[routes]]
pattern = "support.llm4agents.com"
custom_domain = true

# Workers Static Assets — serves the admin SPA (root) + widget bundle (/widget.js)
# alongside the worker. `directory` is populated by scripts/bundle-assets.mjs
# before `wrangler deploy` (combines apps/admin/dist + apps/widget/dist).
#
# Routing:
#   - run_worker_first paths (API + health + metrics) always hit the worker
#   - Everything else hits the assets handler:
#       /             -> public/index.html (admin SPA)
#       /widget.js    -> public/widget.js  (widget bundle)
#       /assets/...   -> public/assets/... (admin bundled JS/CSS)
#       any 404       -> public/index.html (SPA fallback, React Router takes over)
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [
  "/v1/*",
  "/healthz",
  "/readyz",
  "/metrics",
]

[[d1_databases]]
binding = "DB"
database_name = "support-llm4agents"
database_id = "79a84837-5b62-4554-8213-c95f7bd10f6a"
migrations_dir = "migrations-d1"

[[r2_buckets]]
binding = "FILES"
bucket_name = "support-llm4agents-files"

[[vectorize]]
binding = "VEC"
index_name = "support-llm4agents-chunks"

[durable_objects]
bindings = [
  { name = "HUB", class_name = "BroadcastHubDurableObject" },
  { name = "HANDOFF_TIMER", class_name = "HandoffTimeoutDurableObject" },
]

# Analytics Engine dataset for Prometheus-shaped metrics emitted via
# `MetricsPort` -> `AnalyticsEngineMetrics`. Query the dataset with the
# Cloudflare AE REST API; there is no scrape endpoint on the worker
# (`/metrics` returns 404 in the Cloudflare deploy).
[[analytics_engine_datasets]]
binding = "METRICS"
dataset = "support_llm4agents_metrics"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BroadcastHubDurableObject", "HandoffTimeoutDurableObject"]

[triggers]
crons = []  # No crons in P4; reserved for future scheduled sweeps

# Bundle .sql migration files as text strings (esbuild's Text loader).
# `d1Migrations.ts` imports `.sql` files directly without a `?raw` suffix
# (wrangler's esbuild matches the glob on the raw path, no query strings).
# Vitest uses its own Vite layer to handle the imports (see `sql.d.ts`).
[[rules]]
type = "Text"
globs = ["**/*.sql"]
fallthrough = true
